receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: basic
  otlphttp/hyperdx:
    endpoint: http://hyperdx:4318

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:8889

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/hyperdx]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/hyperdx]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/hyperdx]
